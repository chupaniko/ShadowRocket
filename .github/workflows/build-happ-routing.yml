name: Build HAPP routing

on:
  workflow_dispatch:
  schedule:
    - cron: "15 4 * * *"
  push:
    branches:
      - main
    paths:
      - "shadowrocket.conf"
      - "rules/*.list"
      - "scripts/sync_lists.py"
      - "scripts/build_happ_routing.py"
      - ".github/workflows/sync-lists.yml"
      - ".github/workflows/build-happ-routing.yml"

permissions:
  contents: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Sync rule lists
        run: python scripts/sync_lists.py --no-pull

      - name: Build HAPP artifacts
        run: python scripts/build_happ_routing.py

      - name: Commit and push changes
        run: |
          set -euo pipefail
          if [[ -n "$(git status --porcelain rules HAPP)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add rules/*.list HAPP/*
            git commit -m "chore: sync rule lists and build happ artifacts"
            git push
          else
            echo "No changes to commit."
          fi
